name: News Crawl (KR + US + CRYPTO)

on:
  schedule:
    - cron: '0 * * * *'       # 매 1시간 (시장뉴스)
    - cron: '0 */4 * * *'     # 매 4시간 (종목별 + US + CRYPTO)
  workflow_dispatch:
    inputs:
      scope:
        description: 'market-only / full'
        required: false
        default: 'full'

jobs:
  market-news:
    # 매 시간 실행 (모든 schedule + workflow_dispatch)
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests beautifulsoup4 python-dotenv

      - name: Create .env.local
        run: |
          echo "NEXT_PUBLIC_SUPABASE_URL=${{ secrets.SUPABASE_URL }}" > .env.local
          echo "SUPABASE_SERVICE_ROLE_KEY=${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}" >> .env.local

      - name: Crawl KR market news
        run: python scripts/fetch_news.py --market --max-pages 3

  stock-news:
    # 4시간마다 or 수동 full 실행 시에만
    if: github.event.schedule == '0 */4 * * *' || github.event_name == 'workflow_dispatch' && github.event.inputs.scope != 'market-only'
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests beautifulsoup4 python-dotenv

      - name: Create .env.local
        run: |
          echo "NEXT_PUBLIC_SUPABASE_URL=${{ secrets.SUPABASE_URL }}" > .env.local
          echo "SUPABASE_SERVICE_ROLE_KEY=${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}" >> .env.local

      - name: Crawl KR stock news
        run: python scripts/fetch_news.py --all --max-pages 2

      - name: Crawl US stock news
        run: python scripts/fetch_news.py --us --max-results 10

      - name: Crawl CRYPTO news
        run: python scripts/fetch_news.py --crypto --max-results 10
